<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEX JARVIS MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=82" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./app.bundle.js?v=82"></script>
    <script>
      (() => {
        const visibleLogo = new URL("./assets/apex-logo.svg?v=55", window.location.href).href;
        const fixLogo = () => {
          document.querySelectorAll("img.apex-logo").forEach((image) => {
            if (image.src !== visibleLogo) {
              image.src = visibleLogo;
            }
          });
        };

        fixLogo();
        new MutationObserver(fixLogo).observe(document.body, {
          childList: true,
          subtree: true,
        });
      })();
    </script>
  </body>
</html>
